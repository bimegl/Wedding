{% extends "base.html" %}

{% block content %}

<section class="page page-purple" style="max-width:400px; margin:60px auto; text-align:center;">
  <h2 class="section-title" style="margin-bottom:30px;">Admin Login</h2>

  <form method="POST" class="simple-form">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>

    <button type="submit" class="btn">Login</button>
  </form>
</section>

{% endblock %}
