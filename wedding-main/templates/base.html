<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Primary Meta -->
    <title>Lucio & Beatrice — Wedding</title>
    <meta name="title" content="Lucio & Beatrice — Wedding">
    <meta name="description" content="Siete invitati al nostro matrimonio. Scoprite tutti i dettagli della giornata e confermate la vostra presenza.">

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://DanieleFrancesca.pythonanywhere.com/">
    <meta property="og:title" content="Lucio & Beatrice — Wedding">
    <meta property="og:description" content="Il nostro matrimonio — dettagli, programma e conferma partecipazione.">
    <meta property="og:site_name" content="Lucio & Beatrice">
    <meta property="og:image" content="https://DanieleFrancesca.pythonanywhere.com/static/images/LogoHQ-landscape-v2.jpg">
    <meta property="og:image:secure_url" content="https://DanieleFrancesca.pythonanywhere.com/static/images/LogoHQ-landscape-v2.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Logo Lucio & Beatrice">

    <!-- Twitter Card (Telegram and others) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lucio & Beatrice — Wedding">
    <meta name="twitter:description" content="Il nostro matrimonio — dettagli, programma e conferma partecipazione.">
    <meta name="twitter:image" content="https://DanieleFrancesca.pythonanywhere.com/static/images/LogoHQ-square-v2.png">
    <meta name="twitter:image:alt" content="Logo Lucio & Beatrice">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/favicon.png">
    <link rel="shortcut icon" href="/static/images/favicon.png" type="image/png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/static/style.css">

    {% block head %}{% endblock %}
</head>

<body>

<header class="site-header">
  <div class="container header-inner">
    <a class="logo-img-header" href="/">
      <img src="/static/images/logoHQBG.png" class="logo-img-header">
    </a>

    <!-- Menu Button -->
    <button class="menu-toggle">
  <i class="fa fa-bars"></i>
</button>

<div class="main-nav-overlay">
  <div class="main-nav-content">

    <button class="menu-close">
      <i class="fa fa-times"></i>
    </button>

	<a href="/#home"><i class="fa fa-home" aria-hidden="true"></i>  Benvenuti</a>
    <a href="/#dove"><i class="fa fa-location-dot"></i>  Location</a>
    <a href="/#rsvp"><i class="fa fa-envelope"></i> Conferma Partecipazione</a>
	<a href="/#contatti"> 	<i class="fa-solid fa-address-book"></i> Contatti</a>
	<a href="/#listaNozze"> <i class="fa-solid fa-gift"></i> Lista di Nozze</a>
    <a href="/#programma"><i class="fa fa-calendar"></i> Programma della Giornata</a>
	<a href="/#foto"> <i class="fa-solid fa-camera"></i> Foto</a>

	<span></span>
	<span></span>
	<a href="/login" class="admin-link"> <i class="fa-solid fa-screwdriver-wrench"></i> Admin</a>

  </div>
</div>
</header>

<main style="width: 100%;">
	{% block content %}{% endblock %}
</main>


<footer class="site-footer">
	<div class="container">
		<p>© <span id="year"></span> Lucio & Beatrice — Tutti i diritti riservati</p>
	</div>
</footer>

<script src="/static/js.js"></script>
{% block scripts %}{% endblock %}

</body>
</html>
